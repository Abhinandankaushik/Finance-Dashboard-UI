<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Gradient background circle -->
  <circle cx="90" cy="90" r="90" fill="url(#bgGradient)"/>
  
  <!-- Finance chart icon -->
  <!-- Bars -->
  <g stroke="white" stroke-width="8" stroke-linecap="round" fill="none">
    <!-- Bar 1 -->
    <line x1="40" y1="130" x2="40" y2="80"/>
    <!-- Bar 2 -->
    <line x1="70" y1="130" x2="70" y2="60"/>
    <!-- Bar 3 -->
    <line x1="100" y1="130" x2="100" y2="75"/>
    <!-- Bar 4 -->
    <line x1="130" y1="130" x2="130" y2="50"/>
  </g>
  
  <!-- Trending up arrow -->
  <g stroke="white" stroke-width="6" stroke-linecap="round" fill="none">
    <polyline points="35,95 55,75 75,85 140,30" stroke-linejoin="round"/>
  </g>
  
  <!-- Arrow head -->
  <polygon points="140,30 145,45 130,40" fill="white"/>
</svg>
