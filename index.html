<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinDash</title>
    <meta name="description" content="Track and manage your finances with intelligent insights, spending breakdown, and transaction management." />
    <meta name="author" content="FinDash Team" />

    <!-- Open Graph & Social Meta Tags -->
    <meta property="og:title" content="FinDash - Smart Finance Dashboard" />
    <meta property="og:description" content="Track and manage your finances with intelligent insights, spending breakdown, and transaction management." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FinDash - Smart Finance Dashboard" />
    <meta name="twitter:description" content="Track and manage your finances with intelligent insights, spending breakdown, and transaction management." />
  </head>

  <body>
    <div id="root"></div>
    <script>
      // Polyfill for Performance API
      if (!window.performance) {
        window.performance = {};
      }
      if (!performance.clearMarks) {
        performance.clearMarks = function() {};
      }
      if (!performance.mark) {
        performance.mark = function() {};
      }
      if (!performance.measure) {
        performance.measure = function() {};
      }
      if (!performance.clearMeasures) {
        performance.clearMeasures = function() {};
      }
      if (!performance.getEntriesByName) {
        performance.getEntriesByName = function() { return []; };
      }
      if (!performance.getEntriesByType) {
        performance.getEntriesByType = function() { return []; };
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
